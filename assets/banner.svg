<svg width="720" height="200" viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C0D5D6"/>
      <stop offset="45%" stop-color="#E5E1DD"/>
      <stop offset="100%" stop-color="#A58D66"/>
    </linearGradient>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#083A4F" stop-opacity="0"/>
      <stop offset="20%" stop-color="#A58D66"/>
      <stop offset="50%" stop-color="#C0D5D6"/>
      <stop offset="80%" stop-color="#A58D66"/>
      <stop offset="100%" stop-color="#083A4F" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="720" height="200" fill="#083A4F"/>

  <!-- subtle circuit-style corner accents -->
  <g stroke="#407E8C" stroke-width="1" opacity="0.35" fill="none">
    <circle cx="40" cy="40" r="2.5" fill="#407E8C"/>
    <path d="M40 40 L40 20 L80 20"/>
    <circle cx="80" cy="20" r="2.5" fill="#A58D66"/>
    <circle cx="680" cy="160" r="2.5" fill="#407E8C"/>
    <path d="M680 160 L680 180 L640 180"/>
    <circle cx="640" cy="180" r="2.5" fill="#A58D66"/>
  </g>

  <text x="360" y="105" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="4" fill="url(#titleGradient)">ContentIQ</text>

  <line x1="130" y1="135" x2="590" y2="135" stroke="url(#lineGradient)" stroke-width="1.5"/>

  <text x="360" y="164" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" letter-spacing="3" fill="#C0D5D6">AI-POWERED CONTENT INTELLIGENCE</text>
</svg>
